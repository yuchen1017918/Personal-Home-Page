<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">个人主页</h1>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#about">关于</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页区域 -->
    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <h2>你好，我是 <span class="highlight">开发者</span></h2>
                <p>专注于前端开发，热爱创造优雅的用户体验</p>
                <button class="btn" id="contactBtn">联系我</button>
            </div>
        </div>
    </section>

    <!-- 关于区域 -->
    <section id="about" class="about">
        <div class="container">
            <h2>关于我</h2>
            <p>拥有前端开发经验，熟练掌握 HTML5、CSS3、JavaScript，擅长构建响应式、高性能的静态网页。</p>
        </div>
    </section>

    <!-- 联系区域 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系方式</h2>
            <div class="contact-info">
                <p>邮箱：example@mail.com</p>
                <p>GitHub：github.com/yourname</p>
                <img src="QR_code.png" alt="二维码" class="qr-code">
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2025 个人主页. 保留所有权利.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
