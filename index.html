<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的个人主页</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.ico">

    <!-- README 渲染样式 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <h1 class="logo">个人主页</h1>
            <ul class="nav-links">
                <li><a href="#home">首页</a></li>
                <li><a href="#readme">关于我</a></li>
                <li><a href="#contact">联系</a></li>
            </ul>
        </div>
    </nav>

    <!-- 首页区域 -->
    <section id="home" class="hero">
        <div class="container">
            <div class="hero-content">
                <h2>你好，我是 <span class="highlight">宇辰</span></h2>
                <p>一个热爱折腾的前端小白</p>
                <button class="btn" id="contactBtn">联系我</button>
            </div>
        </div>
    </section>

    <!-- 关于我（自动加载 README） -->
    <section id="readme" class="about">
        <div class="container">
            <div id="readme-content" class="markdown-body"></div>
        </div>
    </section>

    <!-- 联系区域 -->
    <section id="contact" class="contact">
        <div class="container">
            <h2>联系方式</h2>
            <div class="contact-info">
                <p>邮箱：3984392570@qq.com</p>
                <p>GitHub：https://github.com/yuchen1017918</p>
                <img src="QR_code.png" alt="二维码" class="qr-code">
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer>
        <div class="container">
            <p>&copy; 2025 个人主页. 保留所有权利.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
